# ─── NETWORK ───────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ─── REPLICATION ───────────────────────────────────────────
# Point at the master by Docker service name
replicaof redis-master 6379

replica-serve-stale-data yes
replica-read-only yes

# How long (seconds) to wait before declaring the master down
repl-timeout 60

# ─── PERSISTENCE ───────────────────────────────────────────
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

save 900 1
save 300 10
save 60  10000

# ─── PERFORMANCE ───────────────────────────────────────────
maxmemory-policy allkeys-lru
hz 15

# ─── LOGGING ───────────────────────────────────────────────
loglevel notice
logfile ""
