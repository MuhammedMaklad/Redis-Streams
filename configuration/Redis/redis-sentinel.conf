# ─── NETWORK ───────────────────────────────────────────────
bind 0.0.0.0
port 26379
protected-mode no

# ─── MONITOR ───────────────────────────────────────────────
sentinel monitor mymaster redis-master 6379 2

# ─── TIMING ────────────────────────────────────────────────
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
sentinel parallel-syncs mymaster 1

# ─── HOSTNAME RESOLUTION ───────────────────────────────────
# resolve-hostnames: lets sentinel resolve "redis-master" → IP at startup
# announce-hostnames: REMOVED — after failover sentinel must advertise
#                     the new master's IP (not hostname), because the
#                     old hostname DNS entry vanishes when container stops
sentinel resolve-hostnames yes

# ─── LOGGING ───────────────────────────────────────────────
loglevel notice
logfile ""
