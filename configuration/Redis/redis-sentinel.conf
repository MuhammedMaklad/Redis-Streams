# Networking
bind 0.0.0.0
port 26379

# Sentinel monitor <master-group-name> <ip> <port> <quorum>
# '2' means at least 2 Sentinels must agree the master is down
sentinel monitor mymaster redis-master 6379 2

# How long (ms) until we consider the master "down"
sentinel down-after-milliseconds mymaster 5000

# After a failover, how long to wait before trying another
sentinel failover-timeout mymaster 60000

# How many replicas can be reconfigured to the new master at once
sentinel parallel-syncs mymaster 1

# If using passwords:
# sentinel auth-pass mymaster your_strong_password