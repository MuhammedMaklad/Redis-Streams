# ─── NETWORK ───────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ─── IDENTITY ──────────────────────────────────────────────
# No replicaof here — this IS the master

# ─── PERSISTENCE ───────────────────────────────────────────
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

save 900 1
save 300 10
save 60  10000

# ─── REPLICATION ───────────────────────────────────────────
# Allow replicas to serve stale data while re-syncing
replica-serve-stale-data yes

# After failover a sentinel will inject "REPLICAOF <new-master>"
# so this node may become a replica; keep replica settings sane.
replica-read-only yes

# ─── PERFORMANCE ───────────────────────────────────────────
maxmemory-policy allkeys-lru
hz 15

# ─── LOGGING ───────────────────────────────────────────────
loglevel notice
logfile ""
